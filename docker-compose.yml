version: "3.8"
services:
  producer:
    image: producer:1.0
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: "${PORT:-3000}"
      NODE_ENV: "${NODE_ENV:-production}"
      RABBITMQ_URL: "${RABBITMQ_URL:-amqp://rabbitmq:5672}"
      RABBITMQ_EXCHANGE: "${RABBITMQ_EXCHANGE:-complaints.exchange}"
      RABBITMQ_ROUTING_KEY: "${RABBITMQ_ROUTING_KEY:-complaint.received}"
